name: CI

on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cine_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cine_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cine_ci
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - run: npm run test:coverage

      - name: Postgres integration probes
        run: npm run test:integration
        env:
          RUN_DB_INTEGRATION: "true"

      - name: Backend coverage artefacts
        if: github.event_name == 'pull_request' || github.ref_name == 'main' || github.ref_name == 'master'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 14
          if-no-files-found: ignore

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage

      - name: UI coverage artefacts
        if: github.event_name == 'pull_request' || github.ref_name == 'main' || github.ref_name == 'master'
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: ui/coverage
          retention-days: 14
          if-no-files-found: ignore

  deploy:
    name: Deploy (Render hooks)
    needs: [backend, ui]
    if: >-
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Trigger production deploy hooks
        env:
          HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
          HOOK_UI: ${{ secrets.RENDER_DEPLOY_HOOK_UI }}
        run: |
          set -eu
          if [ -z "${HOOK_API:-}" ] || [ -z "${HOOK_UI:-}" ]; then
            echo "::notice title=Deploy skipped::Add repository secrets RENDER_DEPLOY_HOOK_API and RENDER_DEPLOY_HOOK_UI to POST to Render Deploy Hooks after each passing main branch build (see docs/CI_CD.md)."
            exit 0
          fi
          echo "Posting API deploy hook …"
          curl -fsS -m 600 -X POST "$HOOK_API"
          echo "Posting UI deploy hook …"
          curl -fsS -m 600 -X POST "$HOOK_UI"
          echo "Deploy hooks acknowledged."
